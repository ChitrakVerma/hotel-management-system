<!-- Booking Module - Feature Branch -->
<!-- Added form validation and booking confirmation -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Horizon Hotel | Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">Grand Horizon</a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="rooms.html">Rooms</a></li>
                    <li><a href="booking.html">Book Now</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="admin.html">Admin</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h2 class="page-title">Make a Reservation</h2>
        <div class="form-container">
            <form id="bookingForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" class="form-control" required>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="checkin">Check-in Date</label>
                        <input type="date" id="checkin" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="checkout">Check-out Date</label>
                        <input type="date" id="checkout" class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="roomType">Room Type</label>
                    <select id="roomType" class="form-control" required>
                        <option value="">Select a room...</option>
                        <option value="Standard">Standard Room</option>
                        <option value="Deluxe">Deluxe Room</option>
                        <option value="Suite">Suite</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="guests">Number of Guests</label>
                    <select id="guests" class="form-control" required>
                        <option value="">Select guests...</option>
                        <option value="1">1 Guest</option>
                        <option value="2">2 Guests</option>
                        <option value="3">3 Guests</option>
                        <option value="4">4 Guests</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="requests">Special Requests</label>
                    <textarea id="requests" class="form-control" rows="4"></textarea>
                </div>

                <button type="submit" class="btn" style="width: 100%;">Confirm Booking</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Grand Horizon Hotel. All rights reserved.</p>
    </footer>

<script>
        document.getElementById('bookingForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // 1. Gather data from the form
            // Note: room_id relies on the dropdown index for now (1=Standard, 2=Deluxe, 3=Suite)
            const bookingData = {
                guest_id: 1, // Hardcoded to Guest #1 (John Doe) from our SQL script for now
                room_id: document.getElementById('roomType').selectedIndex, 
                check_in: document.getElementById('checkin').value,
                check_out: document.getElementById('checkout').value,
                requests: document.getElementById('requests').value
            };

            try {
                // 2. Send the data to your Node.js API
                const response = await fetch('http://localhost:3000/api/bookings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(bookingData)
                });

                const result = await response.json();

                // 3. Handle the server's response
                if (result.success) {
                    alert(`${result.message} Reference: ${result.referenceId}\nThank you for your reservation!`);
                    this.reset(); // Clears the form
                } else {
                    alert("Sorry, there was an error processing your booking.");
                }
            } catch (error) {
                console.error("Error connecting to API:", error);
                alert("Could not connect to the server. Please ensure your Node.js API is running.");
            }
        });
    </script>
</body>
</html>
