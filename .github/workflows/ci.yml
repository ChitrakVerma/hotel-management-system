name: CI Pipeline

on:
  push:
    branches: [ "main", "develop", "feature/**", "fix/**" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
          # Treat all other issues as warnings
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true

      - name: Run tests
        run: |
          pip install pytest pytest-cov
          if [ -d tests ] && [ "$(find tests -name '*.py' | head -1)" ]; then
            pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
          else
            echo "No tests found yet — skipping test run."
          fi

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify project structure
        run: |
          echo "Verifying required project structure..."
          required_dirs=("src/backend" "src/frontend" "src/database" "tests" "docs")
          for dir in "${required_dirs[@]}"; do
            if [ -d "$dir" ]; then
              echo "  ✅  $dir exists"
            else
              echo "  ❌  $dir is missing"
              exit 1
            fi
          done
          required_files=("README.md" "docs/SCMP.md" "docs/PROJECT_PLAN.md" ".gitignore" "CONTRIBUTING.md" "VERSION.md")
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "  ✅  $file exists"
            else
              echo "  ❌  $file is missing"
              exit 1
            fi
          done
          echo "All required files and directories present."
